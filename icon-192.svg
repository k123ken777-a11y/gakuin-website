<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6fa8"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <radialGradient id="ball" cx="36%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff5cc"/>
      <stop offset="30%" stop-color="#ffcc44"/>
      <stop offset="70%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c24a00"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="26%" r="38%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- 丸背景 -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>

  <!-- 水玉装飾 -->
  <circle cx="18" cy="18" r="7" fill="rgba(255,255,255,0.18)"/>
  <circle cx="174" cy="22" r="5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="12" cy="160" r="9" fill="rgba(255,255,255,0.12)"/>
  <circle cx="178" cy="155" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="170" cy="80" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="22" cy="90" r="5" fill="rgba(255,255,255,0.12)"/>

  <!-- 星の装飾 -->
  <text x="28" y="48" font-size="16" fill="rgba(255,255,255,0.5)" font-family="sans-serif">✦</text>
  <text x="152" y="44" font-size="12" fill="rgba(255,255,255,0.45)" font-family="sans-serif">✦</text>
  <text x="160" y="130" font-size="10" fill="rgba(255,255,255,0.35)" font-family="sans-serif">✦</text>

  <!-- ボール本体（影付き） -->
  <circle cx="96" cy="88" r="52" fill="url(#ball)" filter="url(#shadow)"/>

  <!-- ボールライン -->
  <line x1="44" y1="88" x2="148" y2="88" stroke="rgba(120,50,0,0.35)" stroke-width="2.2"/>
  <line x1="96" y1="36" x2="96" y2="140" stroke="rgba(120,50,0,0.35)" stroke-width="2.2"/>
  <path d="M96 36 Q72 56 72 88 Q72 120 96 140" fill="none" stroke="rgba(120,50,0,0.35)" stroke-width="2.2"/>
  <path d="M96 36 Q120 56 120 88 Q120 120 96 140" fill="none" stroke="rgba(120,50,0,0.35)" stroke-width="2.2"/>

  <!-- 光沢 -->
  <circle cx="96" cy="88" r="52" fill="url(#shine)"/>

  <!-- ハート装飾（かわいさプラス） -->
  <text x="80" y="94" font-size="20" fill="rgba(255,255,255,0.22)" font-family="sans-serif" text-anchor="middle">♥</text>

  <!-- 白いリボン帯（下） -->
  <rect x="0" y="148" width="192" height="44" rx="0" fill="rgba(255,255,255,0.92)"/>
  <rect x="0" y="148" width="192" height="44" rx="0" fill="none"/>
  <!-- 角丸を維持するためのマスク -->
  <rect x="0" y="148" width="192" height="6" fill="rgba(255,255,255,0.92)"/>
  <rect x="0" y="180" width="192" height="12" rx="0" fill="url(#bg)"/>
  <rect x="0" y="186" width="192" height="6" fill="url(#bg)"/>

  <!-- 帯を角丸に合わせてクリップ -->
  <clipPath id="roundClip">
    <rect width="192" height="192" rx="44"/>
  </clipPath>
  <rect x="0" y="148" width="192" height="44" fill="rgba(255,255,255,0.92)" clip-path="url(#roundClip)"/>

  <!-- 学校名テキスト -->
  <text x="96" y="165"
    text-anchor="middle"
    font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif"
    font-size="10.5"
    font-weight="700"
    fill="#c2510a"
    filter="url(#textShadow)"
    letter-spacing="0.5">浜松学院興誠中学校</text>

  <text x="96" y="182"
    text-anchor="middle"
    font-family="'Arial Black', 'Noto Sans JP', sans-serif"
    font-size="11"
    font-weight="900"
    fill="#f97316"
    letter-spacing="2">BASKETBALL</text>

</svg>
